trigger:
  branches:
    include:
      - main

variables:
  - group: oci-credentials

pool:
  vmImage: 'ubuntu-latest'

stages:

  # ============================================================
  # STAGE 1 - INIT E PLAN
  # ============================================================
  - stage: TerraformPlan
    displayName: 'Terraform Init & Plan'
    jobs:
      - job: Plan
        displayName: 'Executar Init e Plan'
        steps:

          - task: Bash@3
            displayName: 'Instalar Terraform'
            inputs:
              targetType: inline
              script: |
                TERRAFORM_VERSION="1.8.5"
                wget -q https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                unzip -o terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                sudo mv terraform /usr/local/bin/
                terraform version

          - task: Bash@3
            displayName: 'Preparar chave privada da API OCI (andresturiao.pem)'
            inputs:
              targetType: inline
              script: |
                mkdir -p ~/.oci
                # O conteúdo do .pem vem da variável secreta cadastrada no Variable Group
                echo "$(OCI_PRIVATE_KEY_CONTENT)" > ~/.oci/andresturiao.pem
                chmod 600 ~/.oci/andresturiao.pem
                echo "Chave API OCI salva em ~/.oci/andresturiao.pem"

          - task: Bash@3
            displayName: 'Preparar chave SSH pública para a VM'
            inputs:
              targetType: inline
              script: |
                mkdir -p ~/.ssh
                echo "$(OCI_SSH_PUBLIC_KEY)" > ~/.ssh/lab-publica-ssh.pub
                chmod 644 ~/.ssh/lab-publica-ssh.pub
                echo "Chave SSH pública salva em ~/.ssh/lab-publica-ssh.pub"

          - task: Bash@3
            displayName: 'Terraform Init'
            inputs:
              targetType: inline
              script: |
                cd $(System.DefaultWorkingDirectory)
                terraform init
            env:
              TF_VAR_tenancy_ocid: $(OCI_TENANCY_OCID)
              TF_VAR_user_ocid: $(OCI_USER_OCID)
              TF_VAR_fingerprint: $(OCI_FINGERPRINT)
              TF_VAR_region: $(OCI_REGION)
              TF_VAR_compartment_ocid: $(OCI_COMPARTMENT_OCID)
              TF_VAR_private_key_path: /root/.oci/andresturiao.pem
              TF_VAR_ssh_public_key: $(OCI_SSH_PUBLIC_KEY)

          - task: Bash@3
            displayName: 'Terraform Plan'
            inputs:
              targetType: inline
              script: |
                cd $(System.DefaultWorkingDirectory)
                terraform plan \
                  -var="tenancy_ocid=$(OCI_TENANCY_OCID)" \
                  -var="user_ocid=$(OCI_USER_OCID)" \
                  -var="fingerprint=$(OCI_FINGERPRINT)" \
                  -var="private_key_path=$HOME/.oci/andresturiao.pem" \
                  -var="region=$(OCI_REGION)" \
                  -var="compartment_ocid=$(OCI_COMPARTMENT_OCID)" \
                  -var="ssh_public_key=$(OCI_SSH_PUBLIC_KEY)" \
                  -out=tfplan
                echo "Plan concluído com sucesso"

          - task: PublishPipelineArtifact@1
            displayName: 'Publicar artefato do Plan'
            inputs:
              targetPath: '$(System.DefaultWorkingDirectory)/tfplan'
              artifact: tfplan

  # ============================================================
  # STAGE 2 - APPLY (aguarda aprovação manual)
  # ============================================================
  - stage: TerraformApply
    displayName: 'Terraform Apply'
    dependsOn: TerraformPlan
    condition: succeeded()
    jobs:
      - deployment: Apply
        displayName: 'Aplicar infraestrutura na OCI'
        environment: 'producao'
        strategy:
          runOnce:
            deploy:
              steps:

                - task: Bash@3
                  displayName: 'Instalar Terraform'
                  inputs:
                    targetType: inline
                    script: |
                      TERRAFORM_VERSION="1.8.5"
                      wget -q https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                      unzip -o terraform_${TERRAFORM_VERSION}_linux_amd64.zip
                      sudo mv terraform /usr/local/bin/
                      terraform version

                - task: Bash@3
                  displayName: 'Restaurar chave privada da API OCI'
                  inputs:
                    targetType: inline
                    script: |
                      mkdir -p ~/.oci
                      echo "$(OCI_PRIVATE_KEY_CONTENT)" > ~/.oci/andresturiao.pem
                      chmod 600 ~/.oci/andresturiao.pem

                - task: DownloadPipelineArtifact@2
                  displayName: 'Baixar artefato do Plan'
                  inputs:
                    artifact: tfplan
                    path: $(System.DefaultWorkingDirectory)

                - task: Bash@3
                  displayName: 'Terraform Init'
                  inputs:
                    targetType: inline
                    script: |
                      cd $(System.DefaultWorkingDirectory)
                      terraform init \
                        -var="tenancy_ocid=$(OCI_TENANCY_OCID)" \
                        -var="user_ocid=$(OCI_USER_OCID)" \
                        -var="fingerprint=$(OCI_FINGERPRINT)" \
                        -var="private_key_path=$HOME/.oci/andresturiao.pem" \
                        -var="region=$(OCI_REGION)" \
                        -var="compartment_ocid=$(OCI_COMPARTMENT_OCID)" \
                        -var="ssh_public_key=$(OCI_SSH_PUBLIC_KEY)"

                - task: Bash@3
                  displayName: 'Terraform Apply'
                  inputs:
                    targetType: inline
                    script: |
                      cd $(System.DefaultWorkingDirectory)
                      terraform apply -auto-approve tfplan
                      echo "VM criada com sucesso na OCI - região sa-saopaulo-1"
                      echo "Compartment: lab_terraform_pipeline_azure"